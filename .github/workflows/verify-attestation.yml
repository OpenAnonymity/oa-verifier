name: Verify Attestation (Source → Deployed)

# This workflow rebuilds from source and verifies the deployed attestation matches.
# This is the "paranoid" zero-trust verification path.

on:
  push:
    branches: [main, attestation]
  pull_request:
    branches: [main, attestation]
  workflow_dispatch:
    inputs:
      service_url:
        description: 'Service URL to verify'
        required: true
        default: 'https://oa-verifier.eastus.azurecontainer.io:8443'
  schedule:
    # Run daily to ensure deployed code still matches source
    - cron: '0 0 * * *'

jobs:
  verify:
    name: Verify Source Matches Deployment
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build container from source (Nix)
        id: build
        run: |
          echo "Building container from source with Nix..."
          nix build .#container --print-build-logs
          
          # Get the tarball hash
          TARBALL_HASH=$(sha256sum result | cut -d' ' -f1)
          echo "tarball_hash=$TARBALL_HASH" >> $GITHUB_OUTPUT
          echo "Source build tarball hash: $TARBALL_HASH"
          
          # Load into Docker and get image ID
          docker load < result
          IMAGE_ID=$(docker inspect oa-verifier:latest --format='{{.Id}}' | cut -d: -f2)
          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "Source build image ID: $IMAGE_ID"

      - name: Install Azure CLI and confcom
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az extension add --name confcom --yes

      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login oaverifieracr.azurecr.io -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Pull ACR image and verify against local build
        id: verify
        run: |
          # Pull the deployed image from ACR
          docker pull oaverifieracr.azurecr.io/oa-verifier:latest
          
          # Get both image IDs
          LOCAL_ID=$(docker inspect oa-verifier:latest --format='{{.Id}}')
          ACR_ID=$(docker inspect oaverifieracr.azurecr.io/oa-verifier:latest --format='{{.Id}}')
          
          echo "Local Nix build ID: $LOCAL_ID"
          echo "ACR image ID:       $ACR_ID"
          
          if [ "$LOCAL_ID" = "$ACR_ID" ]; then
            echo "✅ Local Nix build matches ACR image EXACTLY!"
            echo "This cryptographically proves ACR has the same image as our local build."
          else
            echo "❌ VERIFICATION FAILED: Image IDs differ!"
            echo ""
            echo "Local Nix build: $LOCAL_ID"
            echo "ACR image:       $ACR_ID"
            echo ""
            echo "This means the deployed image is NOT built from this source code!"
            echo "Either:"
            echo "  1. ACR has a different/tampered image, or"
            echo "  2. The source code has changed since deployment"
            exit 1
          fi
          
          # Get the ACR digest for policy generation
          ACR_DIGEST=$(docker inspect oaverifieracr.azurecr.io/oa-verifier:latest --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)
          echo "digest=$ACR_DIGEST" >> $GITHUB_OUTPUT
          echo "ACR image digest: $ACR_DIGEST"

      - name: Generate CCE policy (from verified ACR image)
        id: policy
        env:
          ACR_DIGEST: ${{ steps.verify.outputs.digest }}
        run: |
          echo "Generating CCE policy from ACR image..."
          echo "(We've already verified ACR image = local Nix build)"
          
          # Create template matching the deployed configuration
          # Using the EXACT same image reference as deployment
          cat > /tmp/verify-template.json << EOF
          {
            "\$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
            "contentVersion": "1.0.0.0",
            "resources": [{
              "type": "Microsoft.ContainerInstance/containerGroups",
              "apiVersion": "2023-05-01",
              "name": "verify-test",
              "location": "eastus",
              "properties": {
                "sku": "Confidential",
                "containers": [{
                  "name": "oa-verifier",
                  "properties": {
                    "image": "oaverifieracr.azurecr.io/oa-verifier@${ACR_DIGEST}",
                    "ports": [{"port": 8443, "protocol": "TCP"}],
                    "environmentVariables": [
                      {"name": "MAA_ENDPOINT", "value": "http://localhost:8080/attest/maa"},
                      {"name": "MAA_PROVIDER_URL", "value": "sharedeus.eus.attest.azure.net"}
                    ],
                    "resources": {"requests": {"cpu": 1.0, "memoryInGB": 2.0}}
                  }
                },{
                  "name": "skr-sidecar",
                  "properties": {
                    "image": "mcr.microsoft.com/aci/skr@sha256:baa6acf093c011cb26799187b6a535e32bd8248f52dd2cd9c606732b8a23c112",
                    "command": ["/skr.sh"],
                    "ports": [{"port": 8080, "protocol": "TCP"}],
                    "resources": {"requests": {"cpu": 0.5, "memoryInGB": 1.0}}
                  }
                }],
                "imageRegistryCredentials": [{
                  "server": "oaverifieracr.azurecr.io",
                  "username": "${{ secrets.ACR_USERNAME }}",
                  "password": "${{ secrets.ACR_PASSWORD }}"
                }],
                "ipAddress": {
                  "type": "Public",
                  "ports": [{"port": 8443, "protocol": "TCP"}],
                  "dnsNameLabel": "oa-verifier"
                },
                "osType": "Linux",
                "restartPolicy": "Always",
                "confidentialComputeProperties": {"ccePolicy": ""}
              }
            }]
          }
          EOF
          
          # Generate base policy - az confcom will pull from ACR (we've already verified it matches local)
          az confcom acipolicygen -a /tmp/verify-template.json --approve-wildcards --disable-stdio
          
          # Extract and modify policy to add regex rules for dynamic env vars
          POLICY_B64=$(jq -r '.resources[0].properties.confidentialComputeProperties.ccePolicy' /tmp/verify-template.json)
          BASE_POLICY=$(echo "$POLICY_B64" | base64 -d)
          
          # Add regex rules for ALL dynamic env vars (MUST match deploy job!)
          MODIFIED_POLICY=$(echo "$BASE_POLICY" | python3 -c '
          import sys
          import json
          import re
          
          policy = sys.stdin.read()
          match = re.search(r"containers := (\[.*?\])\s*\n\nallow_properties", policy, re.DOTALL)
          if not match:
              match = re.search(r"containers := (\[.*?\])(?=\s*\n\n|\s*$)", policy, re.DOTALL)
          
          if match:
              containers_json = match.group(1)
              containers = json.loads(containers_json)
              if containers and "env_rules" in containers[0]:
                  # MUST match the same env vars as deploy!
                  dynamic_env_vars = [
                      "CCE_POLICY_B64",
                      "STATION_REGISTRY_URL",
                      "STATION_REGISTRY_SECRET",
                      "CHALLENGE_MIN_INTERVAL",
                      "CHALLENGE_MAX_INTERVAL"
                  ]
                  for env_var in dynamic_env_vars:
                      containers[0]["env_rules"].append({
                          "pattern": f"{env_var}=.+",
                          "required": False,
                          "strategy": "re2"
                      })
              new_containers_json = json.dumps(containers, separators=(",", ":"))
              policy = policy[:match.start(1)] + new_containers_json + policy[match.end(1):]
          print(policy)
          ')
          
          SOURCE_HASH=$(echo "$MODIFIED_POLICY" | sha256sum | cut -d' ' -f1)
          echo "source_hash=$SOURCE_HASH" >> $GITHUB_OUTPUT
          echo "Generated policy hash (with dynamic env vars): $SOURCE_HASH"

      - name: Fetch attestation from deployed service
        id: attestation
        env:
          SERVICE_URL: ${{ github.event.inputs.service_url || 'https://oa-verifier.eastus.azurecontainer.io:8443' }}
        run: |
          echo "Fetching attestation from: $SERVICE_URL"
          
          ATTESTATION=$(curl -sfk "$SERVICE_URL/attestation?nonce=verify-$(date +%s)" 2>/dev/null)
          
          if [ -z "$ATTESTATION" ]; then
            echo "❌ Could not fetch attestation from service"
            exit 1
          fi
          
          REMOTE_HASH=$(echo "$ATTESTATION" | jq -r '.summary.cce_policy_hash // .summary.host_data')
          echo "remote_hash=$REMOTE_HASH" >> $GITHUB_OUTPUT
          echo "Remote attestation policy hash: $REMOTE_HASH"
          
          # Also show other attestation details
          echo ""
          echo "Attestation details:"
          echo "$ATTESTATION" | jq '{
            issuer: .summary.issuer,
            type: .summary.attestation_type,
            compliance: .summary.compliance_status,
            debug_disabled: .summary.debug_disabled
          }'

      - name: Compare hashes (Source vs Deployed)
        env:
          SOURCE_HASH: ${{ steps.policy.outputs.source_hash }}
          REMOTE_HASH: ${{ steps.attestation.outputs.remote_hash }}
        run: |
          echo "=============================================="
          echo "  ZERO-TRUST VERIFICATION RESULT"
          echo "=============================================="
          echo ""
          echo "Source build policy hash:  $SOURCE_HASH"
          echo "Deployed attestation hash: $REMOTE_HASH"
          echo ""
          
          if [ "$SOURCE_HASH" = "$REMOTE_HASH" ]; then
            echo "✅ VERIFICATION PASSED"
            echo ""
            echo "The deployed code EXACTLY matches what was built from"
            echo "this repository's source code. Zero-trust verified!"
          else
            echo "❌ VERIFICATION FAILED"
            echo ""
            echo "The deployed code does NOT match this source code!"
            echo "The service may be running different code than expected."
            exit 1
          fi

      - name: Summary
        if: always()
        env:
          SOURCE_HASH: ${{ steps.policy.outputs.source_hash }}
          REMOTE_HASH: ${{ steps.attestation.outputs.remote_hash }}
          TARBALL_HASH: ${{ steps.build.outputs.tarball_hash }}
          IMAGE_ID: ${{ steps.build.outputs.image_id }}
        run: |
          echo "## Zero-Trust Verification Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Source Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Tarball Hash:** \`$TARBALL_HASH\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image ID:** \`$IMAGE_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Policy Hash:** \`$SOURCE_HASH\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Service" >> $GITHUB_STEP_SUMMARY
          echo "- **Attestation Hash:** \`$REMOTE_HASH\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$SOURCE_HASH" = "$REMOTE_HASH" ]; then
            echo "### ✅ Result: VERIFIED" >> $GITHUB_STEP_SUMMARY
            echo "The deployed code matches the source code in this repository." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Result: MISMATCH" >> $GITHUB_STEP_SUMMARY
            echo "The deployed code does NOT match the source code!" >> $GITHUB_STEP_SUMMARY
          fi
