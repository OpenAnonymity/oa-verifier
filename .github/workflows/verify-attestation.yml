name: Verify Attestation (Source → Deployed)

# This workflow rebuilds from source and verifies the deployed container matches.
# It pushes to a local registry to get the manifest digest, which should match
# GHCR if Nix builds are reproducible.

on:
  # Run after Build, Sign, and Deploy completes
  workflow_run:
    workflows: ["Build, Sign, and Deploy"]
    types: [completed]
    branches: [main, attestation]
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      service_url:
        description: 'Service URL to verify'
        required: true
        default: 'https://oa-verifier.eastus.azurecontainer.io'
  
  # Daily verification
  schedule:
    - cron: '0 0 * * *'

jobs:
  verify:
    name: Verify Source Matches Deployment
    runs-on: ubuntu-latest
    # Only run if triggered manually, scheduled, or if the build workflow succeeded
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build container from source (Nix)
        id: build
        run: |
          echo "Building container from source with Nix..."
          nix build .#container --print-build-logs
          
          # Load into Docker
          docker load < result
          
          # Get the image ID for reference
          IMAGE_ID=$(docker inspect oa-verifier:latest --format='{{.Id}}' | cut -d: -f2)
          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "Source build image ID: $IMAGE_ID"

      - name: Get manifest digest via local registry
        id: digest
        run: |
          # Start a local registry
          docker run -d -p 5000:5000 --name registry registry:2
          sleep 3
          
          # Push to local registry to get manifest digest
          docker tag oa-verifier:latest localhost:5000/oa-verifier:latest
          docker push localhost:5000/oa-verifier:latest
          
          # Get the manifest digest (this is what CCE policy uses)
          LOCAL_DIGEST=$(docker inspect localhost:5000/oa-verifier:latest --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)
          echo "digest=$LOCAL_DIGEST" >> $GITHUB_OUTPUT
          echo "Local build manifest digest: $LOCAL_DIGEST"
          
          # Cleanup
          docker stop registry && docker rm registry

      - name: Fetch attestation from deployed service
        id: attestation
        env:
          SERVICE_URL: ${{ github.event.inputs.service_url || 'https://oa-verifier.eastus.azurecontainer.io' }}
        run: |
          echo "Fetching attestation from: $SERVICE_URL"
          
          ATTESTATION=$(curl -sfk "$SERVICE_URL/attestation?nonce=verify-$(date +%s)" 2>/dev/null)
          
          if [ -z "$ATTESTATION" ]; then
            echo "❌ Could not fetch attestation from service"
            exit 1
          fi
          
          # Extract the policy
          POLICY=$(echo "$ATTESTATION" | jq -r '.policy.decoded')
          
          if [ -z "$POLICY" ] || [ "$POLICY" = "null" ]; then
            echo "❌ Could not extract policy from attestation"
            exit 1
          fi
          
          # Extract the image digest from the policy
          # The policy contains: "id":"ghcr.io/xxx/oa-verifier@sha256:..."
          REMOTE_DIGEST=$(echo "$POLICY" | python3 -c "
          import sys, json, re
          policy = sys.stdin.read()
          match = re.search(r'containers\s*:=\s*(\[.*?\])\s*\n', policy, re.DOTALL)
          if match:
              containers = json.loads(match.group(1))
              for c in containers:
                  if c.get('name') == 'oa-verifier':
                      image_id = c.get('id', '')
                      # Extract digest from image ID
                      if '@sha256:' in image_id:
                          print('sha256:' + image_id.split('@sha256:')[1])
                      break
          ")
          
          if [ -z "$REMOTE_DIGEST" ]; then
            echo "❌ Could not extract digest from policy"
            exit 1
          fi
          
          echo "remote_digest=$REMOTE_DIGEST" >> $GITHUB_OUTPUT
          echo "Deployed image digest: $REMOTE_DIGEST"
          
          # Also get policy hash for reference
          POLICY_HASH=$(echo "$ATTESTATION" | jq -r '.summary.cce_policy_hash // .summary.host_data')
          echo "policy_hash=$POLICY_HASH" >> $GITHUB_OUTPUT
          
          echo ""
          echo "Attestation details:"
          echo "$ATTESTATION" | jq '{
            issuer: .summary.issuer,
            type: .summary.attestation_type,
            compliance: .summary.compliance_status,
            debug_disabled: .summary.debug_disabled,
            policy_hash: .summary.cce_policy_hash
          }'

      - name: Compare digests (Source vs Deployed)
        env:
          SOURCE_DIGEST: ${{ steps.digest.outputs.digest }}
          REMOTE_DIGEST: ${{ steps.attestation.outputs.remote_digest }}
          SOURCE_IMAGE_ID: ${{ steps.build.outputs.image_id }}
          REMOTE_POLICY_HASH: ${{ steps.attestation.outputs.policy_hash }}
        run: |
          echo "=============================================="
          echo "  ZERO-TRUST VERIFICATION RESULT"
          echo "=============================================="
          echo ""
          echo "Source build digest:  $SOURCE_DIGEST"
          echo "Deployed digest:      $REMOTE_DIGEST"
          echo ""
          echo "Additional info:"
          echo "  Source image ID:    $SOURCE_IMAGE_ID"
          echo "  Deployed policy:    $REMOTE_POLICY_HASH"
          echo ""
          
          if [ "$SOURCE_DIGEST" = "$REMOTE_DIGEST" ]; then
            echo "✅ VERIFICATION PASSED"
            echo ""
            echo "The deployed container's manifest digest EXACTLY matches"
            echo "what was built from this repository's source code."
            echo ""
            echo "This proves:"
            echo "  - Nix builds are reproducible"
            echo "  - The same source produces the same container"
            echo "  - No tampering occurred between build and deployment"
          else
            echo "❌ VERIFICATION FAILED"
            echo ""
            echo "The deployed container does NOT match this source code!"
            echo ""
            echo "Possible reasons:"
            echo "  - Source code has changed since deployment"
            echo "  - Different Nix version or configuration"
            echo "  - The service was deployed from different code"
            exit 1
          fi

      - name: Generate verification summary
        if: always()
        env:
          SOURCE_DIGEST: ${{ steps.digest.outputs.digest }}
          REMOTE_DIGEST: ${{ steps.attestation.outputs.remote_digest }}
          SOURCE_IMAGE_ID: ${{ steps.build.outputs.image_id }}
          REMOTE_POLICY_HASH: ${{ steps.attestation.outputs.policy_hash }}
        run: |
          echo "## Zero-Trust Verification Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Source Build (from this repository)" >> $GITHUB_STEP_SUMMARY
          echo "- **Manifest Digest:** \`$SOURCE_DIGEST\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image ID:** \`$SOURCE_IMAGE_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Service" >> $GITHUB_STEP_SUMMARY
          echo "- **Manifest Digest:** \`$REMOTE_DIGEST\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Policy Hash:** \`$REMOTE_POLICY_HASH\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$SOURCE_DIGEST" = "$REMOTE_DIGEST" ]; then
            echo "### ✅ Result: VERIFIED" >> $GITHUB_STEP_SUMMARY
            echo "The deployed code matches the source code in this repository." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Result: MISMATCH" >> $GITHUB_STEP_SUMMARY
            echo "The deployed code does NOT match the source code!" >> $GITHUB_STEP_SUMMARY
          fi
