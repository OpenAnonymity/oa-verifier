name: Build Verifier

on:
  push:
    branches: [main]
    paths:
      - 'verifier/**'
  pull_request:
    branches: [main]
    paths:
      - 'verifier/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: Build CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: oa-verify-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: oa-verify-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: oa-verify-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: oa-verify-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: verifier

      - name: Build
        working-directory: verifier
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: verifier/target/${{ matrix.target }}/release/oa-verify${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: verifier

      - name: Build WASM
        working-directory: verifier
        run: wasm-pack build --target web --features wasm --no-default-features

      - name: Prepare web assets
        run: |
          mkdir -p dist
          cp verifier/web/index.html dist/
          cp -r verifier/pkg dist/

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-bundle
          path: dist/

  release:
    name: Create Release
    needs: [build-cli, build-wasm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/oa-verify-linux-x64/oa-verify
            artifacts/oa-verify-macos-x64/oa-verify
            artifacts/oa-verify-macos-arm64/oa-verify
            artifacts/oa-verify-windows-x64.exe/oa-verify.exe
          generate_release_notes: true
