name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      image_digest:
        description: 'Image digest (sha256:...)'
        required: true
        type: string
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
          - staging
        default: staging

  workflow_run:
    workflows: ["Build, Sign, and Push Container"]
    types: [completed]
    branches: [main, attestation]

env:
  RESOURCE_GROUP: oa-verifier
  CONTAINER_NAME: oa-verifier
  LOCATION: eastus
  GHCR_REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://oa-verifier.eastus.azurecontainer.io    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download digest artifact (from build workflow)
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: build-and-sign.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: image-digest
          path: .
        continue-on-error: true

      - name: Get image digest
        id: digest
        run: |
          # Option 1: Manual input
          if [ -n "${{ github.event.inputs.image_digest }}" ]; then
            echo "Using provided digest: ${{ github.event.inputs.image_digest }}"
            echo "digest=${{ github.event.inputs.image_digest }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Option 2: From artifact (workflow_run trigger)
          if [ -f "digest.txt" ]; then
            DIGEST=$(cat digest.txt)
            echo "Using digest from build artifact: $DIGEST"
            echo "digest=$DIGEST" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Option 3: Query GHCR API
          echo "Fetching latest digest from GHCR..."
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          DIGEST=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/v2/${OWNER}/oa-verifier/manifests/latest" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" 2>/dev/null \
            | jq -r '.config.digest' || echo "")
          
          if [ -n "$DIGEST" ] && [ "$DIGEST" != "null" ]; then
            echo "Found digest from GHCR: $DIGEST"
            echo "digest=$DIGEST" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "❌ Could not determine image digest."
          echo "Please run manually with workflow_dispatch and provide the digest."
          exit 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install confcom extension
        run: |
          az extension add --name confcom --yes

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull image for policy generation
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker pull ${{ env.GHCR_REGISTRY }}/${OWNER}/oa-verifier@${{ steps.digest.outputs.digest }}

      - name: Prepare deployment template
        run: |
          # Create deployment template from base template
          cp deploy/aci-template.json deploy/aci-deploy.json
          
          # Lowercase the owner (Docker registries require lowercase)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          # Update with actual values using jq
          jq --arg digest "${{ steps.digest.outputs.digest }}" \
             --arg registry "${{ env.GHCR_REGISTRY }}/${OWNER}" \
             --arg reg_url "${{ secrets.STATION_REGISTRY_URL }}" \
             --arg reg_secret "${{ secrets.STATION_REGISTRY_SECRET }}" \
             --arg min_interval "${{ secrets.CHALLENGE_MIN_INTERVAL || '300' }}" \
             --arg max_interval "${{ secrets.CHALLENGE_MAX_INTERVAL || '600' }}" \
             --arg tls_domain "${{ secrets.TLS_DOMAIN }}" \
             --arg acme_email "${{ secrets.ACME_EMAIL }}" \
             --arg acme_provider "${{ secrets.ACME_DNS_PROVIDER }}" \
             --arg cf_token "${{ secrets.CF_API_TOKEN }}" \
             '
             .parameters.imageDigest.defaultValue = $digest |
             .parameters.registryServer.defaultValue = $registry |
             (.resources[0].properties.containers[0].properties.environmentVariables[] | 
               select(.name == "STATION_REGISTRY_URL")).value = $reg_url |
             (.resources[0].properties.containers[0].properties.environmentVariables[] | 
               select(.name == "STATION_REGISTRY_SECRET")).secureValue = $reg_secret |
             (.resources[0].properties.containers[0].properties.environmentVariables[] | 
               select(.name == "CHALLENGE_MIN_INTERVAL")).value = $min_interval |
             (.resources[0].properties.containers[0].properties.environmentVariables[] | 
               select(.name == "CHALLENGE_MAX_INTERVAL")).value = $max_interval |
             (.resources[0].properties.containers[0].properties.environmentVariables[] | 
               select(.name == "TLS_DOMAIN")).value = $tls_domain |
             (.resources[0].properties.containers[0].properties.environmentVariables[] | 
               select(.name == "ACME_EMAIL")).value = $acme_email |
             (.resources[0].properties.containers[0].properties.environmentVariables[] | 
               select(.name == "ACME_DNS_PROVIDER")).value = $acme_provider |
             (.resources[0].properties.containers[0].properties.environmentVariables[] | 
               select(.name == "CF_API_TOKEN")).secureValue = $cf_token
             ' deploy/aci-deploy.json > deploy/aci-deploy.tmp.json
          mv deploy/aci-deploy.tmp.json deploy/aci-deploy.json

      - name: Generate CCE policy
        id: policy
        run: |
          echo "Generating CCE policy..."
          az confcom acipolicygen \
            -a deploy/aci-deploy.json \
            --approve-wildcards \
            --disable-stdio
          
          # Extract and display policy hash
          POLICY_B64=$(jq -r '.resources[0].properties.confidentialComputeProperties.ccePolicy' deploy/aci-deploy.json)
          POLICY_HASH=$(echo "$POLICY_B64" | base64 -d | sha256sum | cut -d' ' -f1)
          echo "policy_hash=$POLICY_HASH" >> $GITHUB_OUTPUT
          echo "Policy Hash: $POLICY_HASH"

      - name: Delete existing container group
        run: |
          if az container show --name ${{ env.CONTAINER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            echo "Deleting existing container group..."
            az container delete --name ${{ env.CONTAINER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --yes
            sleep 30
          fi

      - name: Deploy to Azure Container Instances
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file deploy/aci-deploy.json \
            --verbose

      - name: Get deployment info
        id: info
        run: |
          IP=$(az container show --name ${{ env.CONTAINER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "ipAddress.ip" -o tsv)
          FQDN=$(az container show --name ${{ env.CONTAINER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "ipAddress.fqdn" -o tsv)
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT
          
          echo ""
          echo "=============================================="
          echo "  DEPLOYMENT INFO - SAVE THIS FOR DNS SETUP"
          echo "=============================================="
          echo ""
          echo "  IP Address: $IP"
          echo "  FQDN:       $FQDN"
          echo ""
          echo "  Point your A record to: $IP"
          echo "=============================================="
          echo ""
          
          # Save to file for artifact
          echo "$IP" > deployment-ip.txt

      - name: Wait for container to be ready
        run: |
          echo "Waiting for container to start..."
          sleep 60
          
          # Test health endpoint
          for i in {1..10}; do
            if curl -sfk "https://${{ steps.info.outputs.fqdn }}/broadcast" >/dev/null 2>&1; then
              echo "Container is healthy!"
              exit 0
            fi
            echo "Attempt $i/10 - waiting..."
            sleep 10
          done
          echo "Warning: Health check did not pass, but container may still be starting"

      - name: Verify attestation matches local build
        id: verify
        env:
          EXPECTED_HASH: ${{ steps.policy.outputs.policy_hash }}
        run: |
          echo "Fetching attestation from deployed service..."
          ATTESTATION=$(curl -sfk "https://${{ steps.info.outputs.fqdn }}/attestation" 2>/dev/null || echo "{}")
          
          if [ -z "$ATTESTATION" ] || [ "$ATTESTATION" = "{}" ]; then
            echo "⚠️ Could not fetch attestation - container may still be starting"
            echo "verified=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          REMOTE_HASH=$(echo "$ATTESTATION" | jq -r '.summary.cce_policy_hash // .summary.host_data // "unknown"')
          echo "Expected policy hash (from local build): $EXPECTED_HASH"
          echo "Remote policy hash (from attestation):   $REMOTE_HASH"
          echo ""
          
          if [ "$EXPECTED_HASH" = "$REMOTE_HASH" ]; then
            echo "✅ VERIFICATION PASSED: Hashes match!"
            echo "   The deployed code matches what was built from source."
            echo "verified=true" >> $GITHUB_OUTPUT
          else
            echo "❌ VERIFICATION FAILED: Hashes do not match!"
            echo "   Expected: $EXPECTED_HASH"
            echo "   Got:      $REMOTE_HASH"
            echo "verified=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Deployment summary
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** https://${{ steps.info.outputs.fqdn }}" >> $GITHUB_STEP_SUMMARY
          echo "**IP Address:** \`${{ steps.info.outputs.ip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image Digest:** \`${{ steps.digest.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if ACME is configured
          if [ -n "${{ secrets.TLS_DOMAIN }}" ] && [ -n "${{ secrets.ACME_EMAIL }}" ]; then
            echo "### TLS Certificate" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **ACME configured** - Let's Encrypt certificate will be obtained for: \`${{ secrets.TLS_DOMAIN }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Make sure your DNS A record points \`${{ secrets.TLS_DOMAIN }}\` to: \`${{ steps.info.outputs.ip }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### DNS Setup (for custom domain with CA certificate)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Using self-signed certificate** - To enable Let's Encrypt, set these secrets:" >> $GITHUB_STEP_SUMMARY
            echo "- \`TLS_DOMAIN\`: Your domain (e.g., verifier.example.com)" >> $GITHUB_STEP_SUMMARY
            echo "- \`ACME_EMAIL\`: Email for Let's Encrypt notifications" >> $GITHUB_STEP_SUMMARY
            echo "- \`ACME_DNS_PROVIDER\`: DNS provider (e.g., cloudflare)" >> $GITHUB_STEP_SUMMARY
            echo "- \`CF_API_TOKEN\`: Cloudflare API token (if using Cloudflare)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Then create an **A record** pointing your domain to: \`${{ steps.info.outputs.ip }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To verify the deployment:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Using the Rust verifier (once available)" >> $GITHUB_STEP_SUMMARY
          echo "oa-verify --url https://${{ steps.info.outputs.fqdn }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Verify Sigstore signature" >> $GITHUB_STEP_SUMMARY
          echo "cosign verify ${{ env.GHCR_REGISTRY }}/${OWNER}/oa-verifier@${{ steps.digest.outputs.digest }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp='https://github.com/${{ github.repository }}/.*' \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer='https://token.actions.githubusercontent.com'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload deployment info artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info
          path: deployment-ip.txt
          retention-days: 90

      - name: Cleanup
        if: always()
        run: |
          rm -f deploy/aci-deploy.json deployment-ip.txt
